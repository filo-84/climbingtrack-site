<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Imprint – ClimbingTrack</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header>
      <img src="img/banner2.jpg" class="banner" />
    </header>

    <nav>
      <a href="index.html">Home</a>
      <a href="delete-account.html">Delete Account</a>
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Service</a>
      <a href="impressum.html">Imprint</a>
    </nav>

    <div class="container">
      <div id="lang-switcher" style="text-align: center; margin: 20px 0">
        <button onclick="setLang('de')">Deutsch</button>
        <button onclick="setLang('en')">English</button>
      </div>
      <h2>Impressum / Imprint</h2>

      <p>
        Name: Matthias Felix<br />
        Adresse: Waldweg 14, 91054 Buckenhof<br />
        Email: climbingtrack@gmail.com
      </p>

      <p>
        This website provides information related to the ClimbingTrack mobile
        application.
      </p>
    </div>

    <footer>© 2026 Matthias Felix. All rights reserved.</footer>
    <script>
      function setLang(lang) {
        localStorage.setItem("climbingtrack-lang", lang);
        showLang(lang);
      }

      function showLang(lang) {
        document
          .querySelectorAll(".lang")
          .forEach((el) => (el.style.display = "none"));
        const active = document.querySelector(".lang-" + lang);
        if (active) active.style.display = "block";
      }

      const savedLang = localStorage.getItem("climbingtrack-lang") || "de";
      showLang(savedLang);
    </script>
  </body>
</html>
